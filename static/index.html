                    <div style={{height:3,background:C.bg,borderRadius:2}}>
                      <div style={{height:'100%',width:`${d.count/max*100}%`,background:color,borderRadius:2}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          </Panel>
          {/* Table */}
          <Panel title="App connection counts" pad={false}>
            <div style={{overflowY:'auto', maxHeight:380}}>
              <table style={{fontSize:11, width:'100%'}}>
                <thead>
                  <tr style={{borderBottom:`1px solid ${C.border}`}}>
                    {['#','Application / Driver','Connections'].map(h=>(
                      <th key={h} style={{padding:'8px 16px',textAlign:'left',fontSize:10,fontWeight:600,color:C.muted,background:C.surface2,whiteSpace:'nowrap'}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {apps.map((a,i)=>(
                    <tr key={i} style={{borderBottom:`1px solid ${C.border2}`}}
                        onMouseEnter={e=>e.currentTarget.style.background=C.surface2}
                        onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                      <td style={{padding:'6px 16px',color:C.faint,fontSize:10}}>{i+1}</td>
                      <td style={{padding:'6px 16px',color:C.text,fontSize:11}}>
                        <div style={{fontWeight:500}}>{a.name}</div>
                        {a.driver&&a.driver!==a.name&&<div style={{fontSize:10,color:C.faint,marginTop:1}}>{a.driver}</div>}
                      </td>
                      <td style={{padding:'6px 16px',fontWeight:600,color:C.blue,fontVariantNumeric:'tabular-nums'}}>{N(a.count)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Panel>
        </div>
      )}

      {/* Authenticated users */}
      {hasAuthData && (
        <Panel title="Authenticated users" sub={`${users.length} distinct users`} pad={false}>
          <div style={{overflowY:'auto', maxHeight:420}}>
            <table style={{fontSize:11, width:'100%'}}>
              <thead>
                <tr style={{borderBottom:`1px solid ${C.border}`}}>
                  {['#','User','DB','Mechanism','Logins','Failures','Role'].map(h=>(
                    <th key={h} style={{padding:'8px 16px',textAlign:'left',fontSize:10,fontWeight:600,color:C.muted,background:C.surface2,whiteSpace:'nowrap'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {users.map((u,i)=>{
                  const hasFail = u.failures > 0;
                  return (
                    <tr key={i} style={{borderBottom:`1px solid ${C.border2}`}}
                        onMouseEnter={e=>e.currentTarget.style.background=C.surface2}
                        onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                      <td style={{padding:'6px 16px',color:C.faint,fontSize:10}}>{i+1}</td>
                      <td style={{padding:'6px 16px',fontFamily:'ui-monospace,Menlo,Monaco,monospace',color:C.text,fontSize:10,maxWidth:340,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={u.user}>{u.user}</td>
                      <td style={{padding:'6px 16px',color:C.muted,fontSize:10}}>{u.db||'—'}</td>
                      <td style={{padding:'6px 16px'}}>
                        {u.mechanism
                          ? <span style={{fontSize:9,padding:'2px 7px',borderRadius:20,fontWeight:600,
                              background:u.mechanism==='SCRAM-SHA-256'?`${C.green}15`:u.mechanism==='MONGODB-X509'?`${C.blue}15`:u.mechanism==='GSSAPI'?`${C.violet}15`:`${C.faint}12`,
                              color:u.mechanism==='SCRAM-SHA-256'?C.green:u.mechanism==='MONGODB-X509'?C.blue:u.mechanism==='GSSAPI'?C.violet:C.faint,
                            }}>{u.mechanism}</span>
                          : <span style={{color:C.faint}}>—</span>
                        }
                      </td>
                      <td style={{padding:'6px 16px',fontWeight:600,color:C.blue,fontVariantNumeric:'tabular-nums'}}>{N(u.count)}</td>
                      <td style={{padding:'6px 16px',fontWeight:hasFail?700:400,color:hasFail?C.red:C.faint,fontVariantNumeric:'tabular-nums'}}>{u.failures>0?N(u.failures):'—'}</td>
                      <td style={{padding:'6px 16px'}}>
                        {u.isCluster
                          ? <span style={{fontSize:9,padding:'2px 7px',borderRadius:20,background:`${C.violet}15`,color:C.violet,fontWeight:600}}>cluster peer</span>
                          : <span style={{fontSize:9,padding:'2px 7px',borderRadius:20,background:`${C.teal}15`,color:C.teal,fontWeight:600}}>client</span>
                        }
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </Panel>
      )}
    </div>
  );
};

const QueryModal = ({q, onClose}) => {
  useEffect(()=>{
    const h=e=>{if(e.key==='Escape')onClose();};
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[]);
  if(!q) return null;
  return(
    <div style={{position:'fixed',inset:0,zIndex:50,display:'flex',alignItems:'center',justifyContent:'center',padding:16,background:'rgba(0,0,0,.35)'}}
         onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{
        width:'100%',maxWidth:760,maxHeight:'90vh',display:'flex',flexDirection:'column',
        background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,
        boxShadow:'0 8px 32px rgba(0,0,0,.18)',overflow:'hidden',
      }}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 18px',borderBottom:`1px solid ${C.border}`,background:C.surface2}}>
          <div>
            <div style={{fontWeight:700,color:C.text,fontSize:13,letterSpacing:'.01em'}}>{q.namespace||'Query detail'}</div>
            {q.queryHash&&<div style={{fontSize:10,fontFamily:'ui-monospace,monospace',color:C.faint,marginTop:2}}>{q.queryHash}</div>}
          </div>
          <button onClick={onClose} style={{fontSize:18,color:C.faint,background:'none',border:'none',lineHeight:1,padding:'4px 6px',cursor:'pointer',borderRadius:6,transition:'background .1s'}}
            onMouseOver={e=>e.currentTarget.style.background=C.bg} onMouseOut={e=>e.currentTarget.style.background='none'}>×</button>
        </div>

        <div style={{flex:1,overflowY:'auto',padding:16,display:'flex',flexDirection:'column',gap:14}}>
          {/* Plan + cmd + sharded badge + files */}
          <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
            <PlanBadge plan={q.planSummary||(q.isSharded?'SHARDED':undefined)}/>
            {q.commandType&&<Tag>{q.commandType}</Tag>}
            {q.isSharded&&<Tag color={C.sky}>sharded</Tag>}
            {(q.files||[]).map((f,i)=>(<Tag key={i} color={C.faint}>{f}</Tag>))}

          {/* Remote wait banner — only when significant */}
          {q.remoteWaitPct>=50&&(

              display:'flex',alignItems:'center',gap:10,padding:'9px 14px',
              background:'#fff7ed',border:'1px solid #fed7aa60',borderRadius:8,

              <span style={{fontSize:13}}>⏱</span>
              <div style={{flex:1}}>
                <span style={{fontWeight:600,color:C.orange,fontSize:12}}>
                  {F1(q.remoteWaitPct)}% remote wait
                </span>
                <span style={{fontSize:11,color:C.muted,marginLeft:6}}>
                  — avg {ms(Math.round(q.avgRemoteWaitMs))} of {ms(Math.round(q.avgDuration))} spent waiting for shard / write concern ack
                </span>
              </div>
            </div>
          )}

          {/* Stats grid */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
            {[
              {l:'Max duration',      v:ms(q.maxDuration),                        c:C.red},
              {l:'Avg duration',      v:ms(Math.round(q.avgDuration)),             c:C.amber},
              {l:'Min duration',      v:ms(q.minDuration),                        c:C.green},
              {l:'Executions',        v:N(q.count)+'×',                           c:C.blue},
              {l:'Total time',        v:ms(q.totalDuration),                      c:C.muted},
              {l:'Avg remote wait',   v:q.avgRemoteWaitMs>0?ms(Math.round(q.avgRemoteWaitMs)):'—', c:q.remoteWaitPct>=50?C.orange:C.muted},
              {l:'Avg docs',          v:N(Math.round(q.avgDocsExamined)),         c:C.amber},
              {l:'Avg keys',          v:N(Math.round(q.avgKeysExamined)),         c:C.green},
              {l:'Avg returned',      v:N(Math.round(q.avgNReturned)),            c:C.teal},
              {l:'Avg reslen',        v:bytes(q.avgResLen),                       c:q.avgResLen>102400?C.red:C.muted},
              {l:'Avg yields',        v:F1(q.avgNumYields),                       c:q.avgNumYields>10?C.amber:C.muted},
              {l:'Inefficiency',      v:null,                                     c:null,badge:true},
            ].filter(s=>s.v!='—'||s.badge).map((s,i)=>(
              <div key={i} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:5,padding:'8px 10px'}}>
                <div style={{fontSize:9,textTransform:'uppercase',letterSpacing:'.05em',fontWeight:500,color:C.faint,marginBottom:4}}>{s.l}</div>
                {s.badge
                  ? <div style={{display:'flex',alignItems:'center'}}><IneffBadge v={q.inefficiency}/></div>
                  : <div style={{fontSize:14,fontWeight:600,color:s.c,fontVariantNumeric:'tabular-nums'}}>{s.v}</div>
                }
              </div>
            ))}
          </div>

          {/* Command JSON */}
          <div>
            <div style={{fontSize:9,textTransform:'uppercase',letterSpacing:'.06em',fontWeight:500,color:C.faint,marginBottom:5}}>Command</div>
            <pre style={{
              fontSize:10,lineHeight:1.6,background:'#1c2027',border:'none',
              borderRadius:6,padding:'12px 14px',overflow:'auto',maxHeight:280,
              fontFamily:'ui-monospace,monospace',margin:0,color:'#e5e7eb',
            }} dangerouslySetInnerHTML={{__html:highlightJson(q.exampleCommand)}}/>
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── TIMELINE ────────────────────────────────────────────────────────────────

const TL_CFG = {
  crash:             { color:'#ef4444', label:'Crash' },
  unclean_shutdown:  { color:'#ef4444', label:'Unclean shutdown' },
  rollback:          { color:'#f97316', label:'Rollback' },
  shutdown:          { color:'#6b7a8d', label:'Shutdown' },
  shutdown_start:    { color:'#9aa3b2', label:'Shutdown init' },
  restart:           { color:'#d97706', label:'Restart' },
  startup:           { color:'#16a34a', label:'Starting' },
  startup_done:      { color:'#16a34a', label:'Ready' },
  primary_change:    { color:'#3b82f6', label:'Primary change' },
  stepdown:          { color:'#d97706', label:'Stepdown' },
  initial_sync:      { color:'#0ea5e9', label:'Initial sync' },
  initial_sync_done: { color:'#16a34a', label:'Sync done' },
  election:          { color:'#8b5cf6', label:'Election' },
};
const TL_DEFAULT = { color:'#9aa3b2', label:'Event' };

// ─── Timeline row with expandable raw JSON ───────────────────────────────────
const TimelineRow = ({ev, ei, isLast}) => {
  const {useUTC} = useContext(TzCtx);
  const [open, setOpen] = useState(false);
  const cfg = TL_CFG[ev.type]||TL_DEFAULT;
  const isCritical = ev.severity==='critical'||ev.severity==='warning';
  const hasRaw = !!(ev.rawLine);

  let prettyRaw = '';
  if (open && hasRaw) {
    try { prettyRaw = JSON.stringify(JSON.parse(ev.rawLine), null, 2); }
    catch(_) { prettyRaw = ev.rawLine; }
  }

  return(
    <div style={{position:'relative',marginBottom:isLast?0:2}}>
      {/* Dot on the vertical track */}
      <div style={{
        position:'absolute',left:-28,top:14,
        width:10,height:10,borderRadius:'50%',
        background:isCritical?cfg.color:'#fff',
        border:`2px solid ${cfg.color}`,
        zIndex:1,
      }}/>

      {/* Main row — clickable */}
      <div
        onClick={()=>hasRaw&&setOpen(o=>!o)}
        style={{
          display:'flex',alignItems:'center',gap:10,
          padding:'6px 12px',borderRadius:6,
          background: open ? cfg.color+'08' : (isCritical?cfg.color+'06':'transparent'),
          border:`1px solid ${open?cfg.color+'40':C.border2}`,
          borderLeft:`3px solid ${cfg.color}`,
          cursor:hasRaw?'pointer':'default',
          transition:'background .12s,border-color .12s',
          userSelect:'none',
        }}
      >
        {/* Type badge */}
        <span style={{
          fontSize:9,fontWeight:700,color:cfg.color,
          textTransform:'uppercase',letterSpacing:'.06em',
          whiteSpace:'nowrap',minWidth:96,flexShrink:0,
        }}>{cfg.label}</span>

        {/* Timestamp */}
        <span style={{fontFamily:'ui-monospace,monospace',fontSize:10,color:C.muted,whiteSpace:'nowrap',flexShrink:0}}>
          {fmtDate(ev.timestamp,useUTC)}
        </span>

        {/* Details */}
        {(ev.details||ev.message)&&(
          <span style={{fontSize:11,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>
            {ev.details||ev.message}
          </span>
        )}

        {/* Source file */}
        {ev.fileName&&(
          <span style={{fontFamily:'ui-monospace,monospace',fontSize:9,color:C.faint,whiteSpace:'nowrap',flexShrink:0}}>
            {ev.fileName}
          </span>
        )}

        {/* Expand chevron */}
        {hasRaw&&(
          <span style={{color:C.faint,fontSize:10,flexShrink:0,transform:open?'rotate(90deg)':'none',transition:'transform .15s'}}>›</span>
        )}
      </div>

      {/* Expanded raw JSON */}
      {open&&hasRaw&&(
        <div style={{
          margin:'4px 0 4px 0',
          borderRadius:6,
          background:'#1d1d1f',
          border:`1px solid #3a3a3c`,
          overflow:'auto',
          maxHeight:320,
        }}>
          <div style={{
            display:'flex',alignItems:'center',justifyContent:'space-between',
            padding:'6px 12px',borderBottom:'1px solid #3a3a3c',
          }}>
            <span style={{fontSize:9,fontWeight:600,color:'#636366',textTransform:'uppercase',letterSpacing:'.06em'}}>Raw JSON</span>
            <span style={{fontSize:9,color:'#636366'}}>{ev.fileName}</span>
          </div>
          <pre style={{
            margin:0,padding:'10px 14px',
            fontFamily:'ui-monospace,"SF Mono","Fira Code",monospace',
            fontSize:10,lineHeight:1.6,
            color:'#e5e5ea',
            whiteSpace:'pre',overflowX:'auto',
          }}>{prettyRaw}</pre>
        </div>
      )}
    </div>
  );
};

const TimelinePage = ({data}) => {
  const {useUTC} = useContext(TzCtx);
  const events = data.timeline || [];
  const ha = data.hourlyActivity || [];

  if(!events.length && !ha.length) return(
    <div style={{padding:40,textAlign:'center',color:C.faint}}>No timeline data</div>
  );

  // Group into sessions (new session starts at each "startup")
  const sessions = [];
  let cur = null;
  events.forEach(ev=>{
    if(ev.type==='startup'||!cur){ cur={events:[]}; sessions.push(cur); }
    cur.events.push(ev);
  });

  return(
    <div style={{padding:12,display:'flex',flexDirection:'column',gap:10}}>
      {events.length>0&&(
        <Panel title="Server lifecycle events" sub={`${events.length} events · ${sessions.length} session${sessions.length>1?'s':''} · click row to view raw JSON`}>
          <div style={{padding:'8px 12px'}}>
            {sessions.map((sess,si)=>(
              <div key={si} style={{marginBottom:si<sessions.length-1?32:0}}>
                {/* Group separator */}
                {sessions.length>1&&si>0&&(
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16,paddingLeft:20}}>
                    <div style={{flex:1,height:1,background:C.border2}}/>
                    <span style={{fontSize:9,color:C.faint,whiteSpace:'nowrap'}}>{sess.events.length} events</span>
                  </div>
                )}
                {/* Timeline track */}
                <div style={{position:'relative',paddingLeft:40}}>
                  {/* Vertical line */}
                  <div style={{
                    position:'absolute',left:15,top:14,
                    width:2,borderRadius:1,
                    bottom: sess.events.length>1 ? 14 : 'auto',
                    height: sess.events.length>1 ? undefined : 0,
                    background:`linear-gradient(to bottom, ${C.border}, ${C.border2})`,
                  }}/>
                  {sess.events.map((ev,ei)=>(
                    <TimelineRow key={ei} ev={ev} ei={ei} isLast={ei===sess.events.length-1}/>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </Panel>
      )}
    </div>
  );
};

// ─── TOP BAR ────────────────────────────────────────────────────────────────
const TABS = [
  {id:'overview',     label:'Overview'},
  {id:'slowq',        label:'Slow queries'},
  {id:'errors',       label:'Errors'},
  {id:'timeline',     label:'Timeline'},
  {id:'replication',  label:'Replication'},
  {id:'connections',  label:'Connections'},
  {id:'messages',     label:'Messages'},
];

const TopBar = ({data, tab, setTab, useUTC, setUseUTC, logTz}) => {
  const sev = data?.severityCounts||{};
  const errs = (sev.E||0)+(sev.F||0);
  const collscans = (data?.slowQueries||[]).filter(q=>(q.planSummary||'').toUpperCase().startsWith('COLLSCAN')).length;
  const tzLabel = useUTC ? 'UTC' : (logTz ? fmtOffset(logTz) : 'Local');
  const showToggle = logTz && logTz !== '+00:00';
  return(
    <header style={{
      position:'fixed',top:0,left:0,right:0,zIndex:40,height:44,
      background:'#fff',
      borderBottom:`1px solid ${C.border}`,
      display:'flex',alignItems:'center',
    }}>
      <div style={{
        display:'flex',alignItems:'center',gap:7,padding:'0 18px',
        minWidth:160,borderRight:`1px solid ${C.border}`,height:'100%',
        fontWeight:700,fontSize:13,color:C.text,
      }}>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C12 2 7 8.5 7 13.5C7 16.538 9.239 19 12 19C14.761 19 17 16.538 17 13.5C17 8.5 12 2 12 2Z" fill="#3b82f6"/>
        </svg>
        Log Analyzer
      </div>

      <nav style={{display:'flex',height:'100%',paddingLeft:4}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            height:'100%',padding:'0 14px',fontSize:12,fontWeight:500,
            border:'none',position:'relative',cursor:'pointer',
            color:tab===t.id?C.blue:C.muted,
            background:'transparent',
          }}>
            {t.label}
            {tab===t.id&&<span style={{position:'absolute',bottom:0,left:10,right:10,height:2,background:C.blue,borderRadius:'2px 2px 0 0'}}/>}
          </button>
        ))}
      </nav>

      <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:5,padding:'0 14px'}}>
        {data&&<>
          {errs>0&&<Tag color={C.red}>{N(errs)} errors</Tag>}
          {collscans>0&&<Tag color={C.amber}>{collscans} COLLSCAN</Tag>}
          <Tag color={C.faint}>{(data.files||[]).length} files</Tag>
          <Tag color={C.faint}>{N(data.totalEntries)} entries</Tag>
          <button
            onClick={showToggle?()=>setUseUTC(v=>!v):undefined}
            title={showToggle?(useUTC?`Switch to log timezone (${fmtOffset(logTz)})`:'Switch to UTC'):`Logs are in ${tzLabel}`}
            style={{
              fontSize:10,fontWeight:500,padding:'3px 8px',borderRadius:4,
              fontFamily:'ui-monospace,monospace',
              background:C.bg,color:C.muted,border:`1px solid ${C.border}`,
              cursor:showToggle?'pointer':'default',
            }}
          >{tzLabel}</button>
        </>}
      </div>
    </header>
  );
};

// ─── APP ────────────────────────────────────────────────────────────────────
const App = () => {
  const [data,    setData]    = useState(null);
  const [loading, setLoading] = useState(true);
  const [error,   setError]   = useState(null);
  const [tab,     setTab]     = useState('overview');
  const [modal,   setModal]   = useState(null);
  const [useUTC,  setUseUTC]  = useState(false);
  const [logTz,   setLogTz]   = useState(null);

  useEffect(()=>{
    fetch('/api/report')
      .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(d=>{
        setData(d);
        setLoading(false);
        // Detect timezone from the raw start timestamp string
        const raw = d.timeRange?.start;
        if(raw) setLogTz(detectTzOffset(raw));
      })
      .catch(e=>{setError(e.message);setLoading(false);});
  },[]);

  useEffect(()=>{document.getElementById('pre-load').style.display='none';},[]);

  if(loading) return(
    <div style={{position:'fixed',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,background:C.bg}}>
      <div className="spin"/>
      <span style={{fontSize:11,color:C.faint,letterSpacing:'.05em'}}>Loading report…</span>
    </div>
  );

  if(error) return(
    <div style={{position:'fixed',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8,background:C.bg}}>
      <span style={{fontWeight:600,color:C.red,fontSize:13}}>Failed to load report</span>
      <span style={{fontSize:11,color:C.faint}}>{error}</span>
    </div>
  );

  return(
    <TzCtx.Provider value={{useUTC, logTz}}>
      <div style={{background:C.bg,minHeight:'100vh'}}>
        <TopBar data={data} tab={tab} setTab={setTab} useUTC={useUTC} setUseUTC={setUseUTC} logTz={logTz}/>
        <main style={{paddingTop:44}}>
          {tab==='overview'     && <OverviewPage    data={data}/>}
          {tab==='slowq'        && <SlowQueriesPage data={data} onModal={setModal}/>}
          {tab==='errors'       && <ErrorsPage      data={data}/>}
          {tab==='timeline'     && <TimelinePage    data={data}/>}
          {tab==='replication'  && <ReplicationPage  data={data}/>}
          {tab==='connections'  && <ConnectionsPage  data={data}/>}
          {tab==='messages'     && <MessagesPage     data={data}/>}
        </main>
        {modal&&<QueryModal q={modal} onClose={()=>setModal(null)}/>}
      </div>
    </TzCtx.Provider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
